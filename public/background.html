<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluto Cursor Network</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            cursor: none;
        }

        canvas {
            display: block;
        }

        /* PLUTO CURSOR */
        .cursor {
            position: fixed;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            /* Pluto colors */
            background: radial-gradient(circle at 30% 30%, #f5d7a1, #caa06a, #8a6a45, #4e3b28);
            box-shadow: 0 0 6px rgba(255, 210, 150, 0.6);
        }
    </style>
</head>
<body>

<canvas id="c"></canvas>
<div class="cursor" id="cursor"></div>

<script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const cursor = document.getElementById("cursor");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let mouse = { x: 0, y: 0 };

    /* cursor movement */
    window.addEventListener("mousemove", e => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
    });

    class Dot {
        constructor() {
            // Fixed: Added * for multiplication
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            // Speed: Added * for multiplication
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
        }

        move() {
            this.x += this.vx;
            this.y += this.vy;

            /* bounce edges - Fixed: Multiply by -1 to reverse direction */
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;

            /* repel from cursor */
            let dx = this.x - mouse.x;
            let dy = this.y - mouse.y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 80) {
                // Fixed: Added * for multiplication
                this.x += (dx / dist) * 1.5;
                this.y += (dy / dist) * 1.5;
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
        }
    }

    let dots = [];
    for (let i = 0; i < 90; i++) {
        dots.push(new Dot());
    }

    function connect() {
        for (let a = 0; a < dots.length; a++) {
            for (let b = a + 1; b < dots.length; b++) {
                let dx = dots[a].x - dots[b].x;
                let dy = dots[a].y - dots[b].y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                /* Fixed: Adjusted distance to 100 so connections are actually visible */
                if (dist < 100) {
                    ctx.beginPath();
                    ctx.moveTo(dots[a].x, dots[a].y);
                    ctx.lineTo(dots[b].x, dots[b].y);
                    // Fade the line based on distance
                    ctx.strokeStyle = `rgba(255, 255, 255, ${1 - dist / 100})`;
                    ctx.lineWidth = 0.6;
                    ctx.stroke();
                }
            }
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        dots.forEach(dot => {
            dot.move();
            dot.draw();
        });
        connect();
        requestAnimationFrame(animate);
    }

    animate();

    // Handle window resize
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
