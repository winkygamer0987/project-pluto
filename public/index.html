<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
        />
        <title>Royal Source</title>

        <link rel="shortcut icon" content="favicon.webp" />

        <link rel="stylesheet" href="index.css" />

        <!-- your scripts -->
        <script src="/scram/scramjet.all.js"></script>
        <script src="baremux/index.js" defer></script>
        <script src="epoxy/index.js" defer></script>
        <script src="register-sw.js" defer></script>
        <script src="search.js" defer></script>
        <script src="index.js" defer></script>

        <!-- ⭐ particles.js library -->
        <script src="particles.js"></script>

        <!-- ⭐ particles.js config (NEON WHITE) -->
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                particlesJS("particles-js", {
                    particles: {
                        number: {
                            value: 300,
                            density: { enable: true, value_area: 1000 }
                        },
                        color: { value: "#ffffff" },
                        shape: { type: "circle" },
                        opacity: {
                            value: 1,
                            random: true,
                            anim: { enable: true, speed: 0.5, opacity_min: 0.2, sync: false }
                        },
                        size: {
                            value: 2,
                            random: true
                        },
                        line_linked: {
                            enable: false
                        },
                        move: {
                            enable: true,
                            speed: 0.6,
                            direction: "bottom",
                            random: true,
                            straight: false,
                            out_mode: "out",
                            bounce: false
                        }
                    },
                    interactivity: {
                        detect_on: "canvas",
                        events: {
                            onhover: { enable: false },
                            onclick: { enable: false },
                            resize: true
                        }
                    },
                    retina_detect: true
                });
            });
        </script>
    </head>

    <body>

        <!-- ⭐ particles.js background container -->
        <div id="particles-js"></div>

        <div
            title="Royal Source"
            class="flex-center logo-wrapper header-center"
        >
            <img class="logo" src="rs.png" alt="Scramjet" />
            <h1>Royal Source</h1>
        </div>

        <div class="flex-center desc left-margin">
            <p>
                Made by AG =D
            </p>
        </div>

        <form id="sj-form" class="flex-center">
            <input
                id="sj-search-engine"
                value="https://www.google.com/search?q=%s"
                type="hidden"
            />
            <input id="sj-address" type="text" placeholder="Search the web freely" />
        </form>

        <div class="desc left-margin">
            <p id="sj-error"></p>
            <pre id="sj-error-code"></pre>
        </div>

        <footer>
            <div></div>
            <div>
                <span>RS &copy; 2026</span>
            </div>
        </footer>
    </body>
</html>
